# =============================================================================
# Banking System Application Properties
# =============================================================================

# Server Configuration
server.port=8080

# =============================================================================
# SQLite Database Configuration
# =============================================================================
spring.datasource.url=jdbc:sqlite:banking.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================================================
# JWT Configuration
# =============================================================================
# IMPORTANT: Replace this secret with a secure random string in production!
# This is a Base64-encoded 256-bit secret key for HS256 algorithm
# Generate a new one with: openssl rand -base64 32
app.jwt.secret=c2VjdXJlLWJhbmtpbmctc3lzdGVtLWp3dC1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmc=
app.jwt.expiration-ms=86400000

# =============================================================================
# Jackson Configuration
# =============================================================================
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ
spring.jpa.open-in-view=false

# =============================================================================
# Logging Configuration
# =============================================================================
logging.level.com.lalit.bank=DEBUG
logging.level.org.springframework.security=DEBUG
